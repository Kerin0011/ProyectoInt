<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Order App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="navbar-container"></div>
    <main id="app-content" class="container-fluid py-3"></main>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toast-notification" class="toast align-items-center text-bg-dark border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toast-message"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/services/api.js"></script>
    <script src="js/router.js"></script>
    <script src="js/components/navbar.js"></script>
    <script src="js/pages/login.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/mesas.js"></script>
    <script src="js/pages/menu-publico.js"></script>
    <script src="js/pages/pedidos.js"></script>
    <script src="js/pages/seguimiento.js"></script>
    <script src="js/pages/platos.js"></script>
    <script src="js/pages/ingredientes.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
